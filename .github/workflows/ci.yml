name: 🔮 CI

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

jobs:
  test_core:
    runs-on: ubuntu-latest
    permissions: {}
    env: &test_env
      CELLAR_ADDON_HOST_TEST: ${{ secrets.CLEVER_CELLAR_ADDON_HOST_FOR_TESTS }}
      CELLAR_ADDON_KEY_ID_TEST: ${{ secrets.CLEVER_CELLAR_ADDON_KEY_ID_FOR_TESTS }}
      CELLAR_ADDON_SECRET_KEY_TEST: ${{ secrets.CLEVER_CELLAR_ADDON_SECRET_KEY_FOR_TESTS }}
      DJANGO_SETTINGS_MODULE: config.settings.test
      REDIS_URL: redis://127.0.0.1:6379
      REQUIREMENTS_PATH: requirements/test.txt
    concurrency:
      group: ${{ github.workflow }}-test_core-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
      cancel-in-progress: true
    services: &test_services
      redis:
        image: redis
        ports:
          - 6379:6379
      postgres:
        # Docker Hub image
        image: postgis/postgis:17-master
        env:
          POSTGRES_PASSWORD: password
        volumes:
          - /var/run/postgresql:/var/run/postgresql
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: ./.github/actions/setup
    - name: 🤹 Django tests
      run: make test TARGET="--ignore=tests/www"

  test_www:
    runs-on: ubuntu-latest
    permissions: {}
    env: *test_env
    concurrency:
      group: ${{ github.workflow }}-test_www-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
      cancel-in-progress: true
    services: *test_services
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: ./.github/actions/setup
    - name: 🤹 Django tests
      run: make test TARGET="tests/www --ignore=tests/www/apply"

  test_www_apply:
    runs-on: ubuntu-latest
    permissions: {}
    env: *test_env
    concurrency:
      group: ${{ github.workflow }}-test_www_apply-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
      cancel-in-progress: true
    services: *test_services
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: ./.github/actions/setup
    - name: 🤹 Django tests
      run: make test TARGET="tests/www/apply"

  quality:
      runs-on: ubuntu-latest
      permissions: {}
      env:
        DJANGO_SETTINGS_MODULE: config.settings.test
        REQUIREMENTS_PATH: requirements/test.txt
      concurrency:
        group: ${{ github.workflow }}-quality-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
        cancel-in-progress: true
      services:
        postgres:
          # Docker Hub image
          image: postgis/postgis:17-master
          env:
            POSTGRES_PASSWORD: password
          volumes:
            - /var/run/postgresql:/var/run/postgresql
          # Set health checks to wait until postgres has started
          options: >-
            --health-cmd pg_isready
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
      steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - name: ✨ Verify quality
        run: make quality
      - name: ✨ Verify DB initialization (migrations, fixtures, ...)
        run: python manage.py migrate && make populate_db
