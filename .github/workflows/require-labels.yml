name: Label Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  merge_group:

jobs:
  require-label:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Verify changelog label
        uses: mheap/github-action-required-labels@23e10fde7e062233401931a0eece796cd9bf3177 # v5.6.0
        with:
          mode: exactly
          count: 1
          labels: "ajouté, modifié, supprimé, tech, dependencies, no-changelog"
