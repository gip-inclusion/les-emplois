{% load django_bootstrap5 %}

<div class="dropdown"{% if request.htmx %} hx-swap-oob="true"{% endif %} id="dropdown-start-date-container">
    <button type="button"
            class="btn btn-dropdown-filter dropdown-toggle {% if filters_form.start_date_lower.value or filters_form.start_date_upper.value %}border-primary fw-bold text-primary{% endif %} {% if filters_form.start_date_lower.errors or filters_form.start_date_upper.errors %}border-danger{% endif %}"
            data-bs-toggle="dropdown"
            data-bs-auto-close="outside"
            aria-expanded="false"
            id="btn-filter-start-date">Date de début de contrat</button>
    <div class="dropdown-menu p-3 shadow border-0 overflow-visible" aria-labelledby="btn-filter-start-date">
        {% bootstrap_field filters_form.start_date_lower %}
        {% bootstrap_field filters_form.start_date_upper %}
        <button class="btn btn-sm btn-primary btn-block">Appliquer</button>
    </div>
</div>
