{% load django_bootstrap5 %}

<fieldset>
    <legend>
        <button class="btn btn-outline-transparent has-collapse-caret collapsed" data-bs-toggle="collapse" data-bs-target="#collapse-date" type="button" aria-expanded="false" aria-controls="collapse-date">
            Date de début de contrat
        </button>
    </legend>
    <div class="mt-3 collapse" id="collapse-date">
        {% bootstrap_field filters_form.start_date_lower %}
        {% bootstrap_field filters_form.start_date_upper %}
    </div>
</fieldset>
