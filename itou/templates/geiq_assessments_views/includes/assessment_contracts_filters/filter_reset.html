{% load str_filters %}

{% if btn_dropdown_filter|default:False %}
    <div id="reset-button-container"{% if request.htmx %} hx-swap-oob="true"{% endif %} class="ms-md-auto">
        {% if filters_counter > 0 %}
            <a href="{{ request.path }}" class="btn btn-ico btn-dropdown-filter" aria-label="Réinitialiser les filtres actifs">
                <i class="ri-eraser-line fw-medium" aria-hidden="true"></i>
                <span>Effacer tout</span>
            </a>
        {% endif %}
    </div>
{% else %}
    {% if filters_counter > 0 %}
        <div class="flex-fill"  id="reset-offcanvas-container">
            <a href="{{ request.path }}" class="btn btn-ico btn-block btn-outline-primary w-100 text-nowrap" aria-label="Réinitialiser {{ filters_counter|pluralizefr:"le filtre actif,les filtres actifs" }}">
                <i class="ri-eraser-line fw-medium" aria-hidden="true"></i>
                <span>Effacer tout</span>
            </a>
        </div>
    {% endif %}
{% endif %}
