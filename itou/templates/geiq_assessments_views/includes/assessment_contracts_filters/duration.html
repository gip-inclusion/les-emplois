{% load django_bootstrap5 %}

<fieldset>
    <legend>
        <button class="btn btn-outline-transparent has-collapse-caret collapsed" data-bs-toggle="collapse" data-bs-target="#collapse-duration" type="button" aria-expanded="false" aria-controls="collapse-duration">
            ≥ 90 jours en {{ assessment.campaign.year }}
        </button>
    </legend>
    <div class="my-3 collapse" id="collapse-duration">
        <ul>
            <li>{% bootstrap_field filters_form.duration_longer_or_equal_90 wrapper_class="" %}</li>
            <li>{% bootstrap_field filters_form.duration_strictly_shorter_90 wrapper_class="" %}</li>
        </ul>
    </div>
</fieldset>
