<form hx-get="{{ request.path }}" hx-trigger="change delay:.5s, duetChange delay:.5s" hx-target="#contracts-results-table" hx-swap="outerHTML" hx-indicator="#contracts-results-table" hx-push-url="true">
    <div class="c-offcanvas-filters offcanvas offcanvas-end" tabindex="-1" id="offcanvasFilters" aria-labelledby="offcanvasFiltersLabel">
        <div class="offcanvas-header">
            <h4 class="mb-0 btn-ico">
                <i class="ri-sound-module-fill fw-medium" aria-hidden="true"></i>
                <span>Filtrer</span>
            </h4>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Fermer"></button>
        </div>
        <div class="offcanvas-body">
            {% include "geiq_assessments_views/includes/assessment_contracts_filters/start_date.html" with filters_form=filters_form only %}
        </div>
        {% include "geiq_assessments_views/includes/assessment_contracts_filters/offcanvas_footer.html" with request=request only %}
    </div>
</form>
