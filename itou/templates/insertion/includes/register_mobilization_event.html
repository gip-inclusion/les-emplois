<script nonce="{{ csp_nonce }}">
    /* JS to POST a mobilization event (a.k.a. iMER, intention de mise en relation)
       when clicking some buttons or links */
    htmx.onLoad(function() {
        const MOBILIZATION_KIND_SELECTOR = "data-emplois-mobilization-kind";
        const trackedLinks = document.querySelectorAll(`[${MOBILIZATION_KIND_SELECTOR}]`);
        Array.from(trackedLinks).forEach(function(link) {
            link.addEventListener("click", function(event) {
                /* The target clicked may be a child (eg. a <span> in a <a>) */
                const el = event.target.closest(`[${MOBILIZATION_KIND_SELECTOR}]`)
                if (!el) return; // This should not happen

                const kind = el.getAttribute(MOBILIZATION_KIND_SELECTOR);
                const externalLink = el.getAttribute("data-emplois-mobilization-external-link");

                const href = el.getAttribute("href"); // can be null
                const linkOpensInCurrentTab = href && el.getAttribute("target") !== "_blank";
                if (linkOpensInCurrentTab) {
                    /* If opening a link in the current tab, preventDefault to let the XHR finish */
                    event.preventDefault();
                }
                function navigate() {
                    if (linkOpensInCurrentTab) {
                        window.location.href = href;
                    }
                }

                const body = new FormData();
                body.set("kind", kind);
                body.set("structure_uid", "{{ structure_uid|default:"" }}");
                body.set("service_uid", "{{ service_uid|default:"" }}");
                if (externalLink) {
                    body.set("service_external_link", externalLink);
                }
                body.set("csrfmiddlewaretoken", "{{ csrf_token }}");
                fetch("{% url "insertion_views:register_mobilization_event" %}", {
                    method: "POST",
                    body,
                }).then(navigate).catch(navigate);
            });
        });
    });
</script>
{# djlint:on #}
