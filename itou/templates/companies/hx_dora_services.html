{% load theme_inclusion %}

{% if di_token %}
    <section class="s-section" data-track-content data-content-name="dora-di-banner">
        <div class="s-section__container container">
            <div class="row">
                <div class="col-12">
                    <div class="c-box">
                        <h3 class="mb-3 mb-lg-4">Découvrez l'offre d'insertion disponible sur votre territoire</h3>
                        <div class="row">
                            <div class="col-12">
                                <iframe src="https://api.data.inclusion.gouv.fr/widget/?token={{ di_token }}&code_commune={{ code_insee }}&score_qualite_minimum=0.9&size=3&display_form=False&exclure_doublons=True"
                                        width="100%"
                                        style="min-height: 450px"></iframe>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endif %}
