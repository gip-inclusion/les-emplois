{% load components %}

<div class="col mb-3 mb-md-4">
    <h3>Données publiques</h3>
    <div class="d-flex flex-column row-gap-3 row-gap-md-4">
        {% component_box_dashboard title=title list=list %}
            {% fragment as title %}
                Données publiques
            {% endfragment %}
            {% fragment as list %}
                <li class="d-flex justify-content-between align-items-center mb-3">
                    <a href="{{ ITOU_PILOTAGE_URL }}/tableaux-de-bord"
                       rel="noopener"
                       target="_blank"
                       aria-label="Accéder aux tableaux de bord publics (ouverture dans un nouvel onglet)"
                       class="btn-link btn-ico has-external-link">
                        <i class="ri-dashboard-line ri-lg fw-normal align-self-start" aria-hidden="true"></i>
                        <span>Accéder aux tableaux de bord publics</span>
                    </a>
                </li>
            {% endfragment %}
        {% endcomponent_box_dashboard %}
    </div>
</div>
